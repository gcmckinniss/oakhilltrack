<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Login — Oak Hill Sprints</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #050505;
    --dark:  #0a0a0a;
    --dark2: #111;
    --dark3: #181818;
    --dark4: #222;
    --white: #F0EDE8;
    --dim:   #888;
    --muted: #555;
    --border: rgba(255,255,255,0.08);
    --border-focus: rgba(255,255,255,0.28);
  }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'LeagueSpartan', 'Arial Narrow', Arial, sans-serif;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: min(420px, 92vw);
    background: var(--dark3);
    border: 1px solid var(--border);
    padding: 3rem 2.5rem 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
  }
  .eyebrow {
    font-size: .6rem;
    font-weight: 700;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: .4rem;
  }
  h1 {
    font-size: 1.7rem;
    font-weight: 800;
    letter-spacing: -.02em;
    text-transform: uppercase;
    line-height: 1;
    color: var(--white);
  }
  .rule { height: 1px; background: var(--border); }

  /* ── Google button ─────────────────────────────────────────── */
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .75rem;
    width: 100%;
    padding: .78rem 1rem;
    background: var(--dark2);
    border: 1px solid var(--border-focus);
    color: var(--white);
    font-family: inherit;
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .google-btn:hover { background: var(--dark4); border-color: rgba(255,255,255,.45); }
  .google-btn:disabled { opacity: .4; cursor: not-allowed; }
  .google-btn svg { flex-shrink: 0; }

  /* ── Divider ───────────────────────────────────────────────── */
  .divider {
    display: flex;
    align-items: center;
    gap: .9rem;
  }
  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider span {
    font-size: .55rem;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── Email / password form ─────────────────────────────────── */
  .fields { display: flex; flex-direction: column; gap: .9rem; }
  .field  { display: flex; flex-direction: column; gap: .4rem; }
  label {
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--dim);
  }
  input {
    background: var(--dark2);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: inherit;
    font-size: .95rem;
    padding: .7rem .9rem;
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--border-focus); }
  .submit-btn {
    width: 100%;
    padding: .85rem;
    background: var(--white);
    color: var(--black);
    border: none;
    font-family: inherit;
    font-size: .68rem;
    font-weight: 800;
    letter-spacing: .18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .15s;
    margin-top: .2rem;
  }
  .submit-btn:hover { opacity: .88; }
  .submit-btn:disabled { opacity: .4; cursor: not-allowed; }
  .error {
    font-size: .68rem;
    color: #c0392b;
    letter-spacing: .05em;
    min-height: 1.1rem;
    margin-top: .3rem;
  }
  .back-link {
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    text-align: center;
    transition: color .15s;
  }
  .back-link:hover { color: var(--dim); }
</style>
<!-- Firebase Auth SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
<div class="card">

  <div>
    <div class="eyebrow">Oak Hill Sprints</div>
    <h1>Coach Login</h1>
  </div>

  <div class="rule"></div>

  <!-- Google Sign-In -->
  <button class="google-btn" id="google-btn" onclick="doGoogleLogin()">
    <!-- Google "G" logo -->
    <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
    </svg>
    Sign in with Google
  </button>

  <!-- Divider -->
  <div class="divider"><span>or</span></div>

  <!-- Email / Password -->
  <div class="fields">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="coach@example.com" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password">
    </div>
    <div>
      <button class="submit-btn" id="login-btn" onclick="doEmailLogin()">Sign In</button>
      <div class="error" id="error-msg"></div>
    </div>
  </div>

  <a class="back-link" href="index.html">&#8592; Back to site</a>
</div>

<script>
  // ── Firebase config — replace with values from Firebase Console ──────────
  // Firebase Console → Project Settings → Your apps → SDK setup
  const firebaseConfig = {
    apiKey: "AIzaSyAS722iY5fXNLoaimZ-MRUXRbTbp0ow8QY",
    authDomain: "oakhillsprints.firebaseapp.com",
    databaseURL: "https://oakhillsprints-default-rtdb.firebaseio.com",
    projectId: "oakhillsprints",
    storageBucket: "oakhillsprints.firebasestorage.app",
    messagingSenderId: "9262627256",
    appId: "1:9262627256:web:a02674ad115b18d6bf374d"
  };
  firebase.initializeApp(firebaseConfig);

  // Redirect immediately if already signed in
  firebase.auth().onAuthStateChanged(function(user) {
    if (user) window.location.href = "index.html";
  });

  // Enter key on email/password fields
  ["email", "password"].forEach(function(id) {
    document.getElementById(id).addEventListener("keydown", function(e) {
      if (e.key === "Enter") doEmailLogin();
    });
  });

  function setLoading(loading, targetBtn, originalLabel) {
    var googleBtn = document.getElementById("google-btn");
    var loginBtn  = document.getElementById("login-btn");
    googleBtn.disabled = loading;
    loginBtn.disabled  = loading;
    if (targetBtn) targetBtn.textContent = loading ? "Signing in\u2026" : originalLabel;
  }

  // ── Google Sign-In ───────────────────────────────────────────────────────
  async function doGoogleLogin() {
    clearError();
    setLoading(true, document.getElementById("google-btn"), "Sign in with Google");
    // Re-insert the SVG after textContent wipe — swap to a label-only approach
    document.getElementById("google-btn").innerHTML =
      '<svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">' +
      '<path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>' +
      '<path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>' +
      '<path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>' +
      '<path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>' +
      '</svg> Signing in\u2026';
    try {
      var provider = new firebase.auth.GoogleAuthProvider();
      await firebase.auth().signInWithPopup(provider);
      // onAuthStateChanged will redirect
    } catch(e) {
      showError(e.code === "auth/popup-closed-by-user"
        ? "Sign-in cancelled."
        : "Google sign-in failed. Try again.");
      resetGoogleBtn();
      setLoading(false, null, null);
    }
  }

  function resetGoogleBtn() {
    document.getElementById("google-btn").innerHTML =
      '<svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">' +
      '<path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>' +
      '<path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>' +
      '<path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>' +
      '<path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>' +
      '</svg> Sign in with Google';
  }

  // ── Email / Password Sign-In ─────────────────────────────────────────────
  async function doEmailLogin() {
    clearError();
    var email    = document.getElementById("email").value.trim();
    var password = document.getElementById("password").value;
    if (!email || !password) { showError("Enter email and password."); return; }
    var btn = document.getElementById("login-btn");
    setLoading(true, btn, "Sign In");
    try {
      await firebase.auth().signInWithEmailAndPassword(email, password);
      // onAuthStateChanged will redirect
    } catch(e) {
      showError("Invalid email or password.");
      document.getElementById("password").value = "";
      setLoading(false, btn, "Sign In");
    }
  }

  function showError(msg) { document.getElementById("error-msg").textContent = msg; }
  function clearError()   { document.getElementById("error-msg").textContent = ""; }
</script>
</body>
</html>
